<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าระบบ | Expense Tracker</title>
    <link rel="icon" type="image/png" href="/expense/assets/images/system_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/expense/assets/css/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/expense/assets/js/core/auth-guard.js"></script>
    <script src="/expense/assets/js/core/components.js"></script>
    <script src="/expense/assets/js/core/utils.js"></script>
    <script src="/expense/assets/js/core/api.js"></script>
</head>

<body class="min-h-screen">

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="max-w-3xl mx-auto w-full px-4 py-8 flex-1">
            <!-- Breadcrumb -->
            <nav class="breadcrumb fade-in">
                <a href="/expense/index.html">Expense App</a>
                <i class="bi bi-chevron-right"></i>
                <span class="active">ตั้งค่าระบบ</span>
            </nav>

            <!-- Header -->
            <header class="mb-8 fade-in">
                <h1 class="text-3xl md:text-4xl font-bold text-blue-600 inline-block pb-1">
                    <i class="bi bi-gear text-blue-600"></i> ตั้งค่าระบบ
                </h1>
                <p class="mt-2 text-slate-500 font-medium">จัดการหมวดหมู่รายจ่ายของคุณ</p>
            </header>

            <!-- Add Category Form -->
            <section class="card-custom p-6 mb-6 fade-in">
                <h2 class="text-lg font-bold text-slate-700 mb-4">
                    <i class="bi bi-plus-circle text-blue-600 mr-2"></i>เพิ่มหมวดหมู่ใหม่
                </h2>
                <form id="addCategoryForm" class="flex gap-3">
                    <input type="text" id="newCategoryName" 
                        class="input-field flex-1" 
                        placeholder="กรอกชื่อหมวดหมู่ที่ต้องการเพิ่ม"
                        maxlength="100">
                    <button type="submit" class="btn-primary px-6">
                        <i class="bi bi-plus-lg mr-1"></i>เพิ่ม
                    </button>
                </form>
                <p class="text-xs text-slate-400 mt-2">
                    <i class="bi bi-info-circle mr-1"></i>หมวดหมู่ที่มีอยู่ในระบบแล้วจะไม่สามารถสร้างซ้ำได้
                </p>
            </section>

            <!-- System Categories -->
            <section class="card-custom p-6 mb-6 fade-in">
                <h2 class="text-lg font-bold text-slate-700 mb-4">
                    <i class="bi bi-shield-check text-green-600 mr-2"></i>หมวดหมู่ระบบ
                </h2>
                <p class="text-sm text-slate-500 mb-4">หมวดหมู่ที่มากับระบบ ไม่สามารถแก้ไขหรือลบได้</p>
                <div id="systemCategories" class="space-y-2">
                    <!-- System categories will be loaded here -->
                </div>
            </section>

            <!-- User Categories -->
            <section class="card-custom p-6 fade-in">
                <h2 class="text-lg font-bold text-slate-700 mb-4">
                    <i class="bi bi-person-fill text-blue-600 mr-2"></i>หมวดหมู่ของฉัน
                </h2>
                <p class="text-sm text-slate-500 mb-4">หมวดหมู่ที่คุณสร้างเอง สามารถลบได้</p>
                <div id="userCategories" class="space-y-2">
                    <!-- User categories will be loaded here -->
                </div>
                <div id="noUserCategories" class="text-center py-8 text-slate-400 hidden">
                    <i class="bi bi-inbox text-4xl mb-2"></i>
                    <p>ยังไม่มีหมวดหมู่ที่สร้างเอง</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Load sidebar using Components.load to execute inline scripts
        Components.load('sidebar-container', '/expense/partials/sidebar.html')
            .then(() => {
                // Set active nav after sidebar loads
                document.getElementById('nav-config')?.classList.add('bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-200');
                document.getElementById('nav-config')?.classList.remove('text-slate-700', 'hover:bg-slate-50', 'hover:text-blue-600');
            });

        // Load categories
        async function loadCategories() {
            try {
                const categories = await window.API.getCategories();
                
                const systemCats = categories.filter(c => c.IsSystem);
                const userCats = categories.filter(c => !c.IsSystem);

                // Render system categories
                const systemEl = document.getElementById('systemCategories');
                systemEl.innerHTML = systemCats.map(cat => `
                    <div class="flex items-center justify-between px-4 py-3 bg-slate-50 rounded-lg">
                        <span class="font-medium text-slate-700">${escapeHtml(cat.Name)}</span>
                        <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">
                            <i class="bi bi-shield-check mr-1"></i>ระบบ
                        </span>
                    </div>
                `).join('');

                // Render user categories
                const userEl = document.getElementById('userCategories');
                const noUserEl = document.getElementById('noUserCategories');
                
                if (userCats.length === 0) {
                    userEl.innerHTML = '';
                    noUserEl.classList.remove('hidden');
                } else {
                    noUserEl.classList.add('hidden');
                    userEl.innerHTML = userCats.map(cat => `
                        <div class="flex items-center justify-between px-4 py-3 bg-blue-50 rounded-lg">
                            <span class="font-medium text-slate-700">${escapeHtml(cat.Name)}</span>
                            <button onclick="deleteCategory('${cat.Id}')" 
                                class="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1 rounded-lg transition-colors">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error('Load categories error:', err);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถโหลดหมวดหมู่ได้', 'error');
            }
        }

        // Add category
        document.getElementById('addCategoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('newCategoryName').value.trim();
            if (!name) return;

            try {
                await window.API.createCategory(name);
                document.getElementById('newCategoryName').value = '';
                await loadCategories();
                Swal.fire('สำเร็จ', 'เพิ่มหมวดหมู่สำเร็จ', 'success');
            } catch (err) {
                Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
            }
        });

        // Delete category
        async function deleteCategory(id) {
            const result = await Swal.fire({
                title: 'ยืนยันการลบ',
                text: 'คุณแน่ใจหรือไม่ที่จะลบหมวดหมู่นี้?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ลบ',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#ef4444'
            });

            if (result.isConfirmed) {
                try {
                    await window.API.deleteCategory(id);
                    await loadCategories();
                    Swal.fire('สำเร็จ', 'ลบหมวดหมู่สำเร็จ', 'success');
                } catch (err) {
                    Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
                }
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial load
        loadCategories();
    </script>
</body>

</html>
