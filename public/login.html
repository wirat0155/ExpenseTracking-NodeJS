<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | Expense Tracker</title>
    <link rel="icon" type="image/png" href="/expense/assets/images/system_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/expense/assets/css/app.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.15);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 0.75rem;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <img src="/expense/assets/images/system_logo.png" alt="Expense App"
                class="w-20 h-20 rounded-2xl object-cover shadow-lg border-2 border-blue-100 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-blue-600">Expense App</h1>
            <p class="text-slate-500 text-sm mt-1">ระบบบันทึกรายรับรายจ่าย</p>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg mb-4">
            <i class="bi bi-exclamation-circle me-1"></i>
            <span id="errorText">อีเมลหรือรหัสผ่านไม่ถูกต้อง</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    <i class="bi bi-envelope text-blue-500 mr-1"></i> อีเมล
                </label>
                <input
                    type="email"
                    id="emailInput"
                    class="input-field"
                    placeholder="กรอกอีเมลของคุณ"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    <i class="bi bi-lock text-blue-500 mr-1"></i> รหัสผ่าน
                </label>
                <div class="relative">
                    <input
                        type="password"
                        id="passwordInput"
                        class="input-field pr-12"
                        placeholder="กรอกรหัสผ่าน"
                        autocomplete="current-password"
                        required
                    >
                    <button
                        type="button"
                        onclick="togglePassword()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                    >
                        <i id="eyeIcon" class="bi bi-eye text-lg"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="btn-login">
                <i class="bi bi-box-arrow-in-right mr-2"></i>
                <span id="loginBtnText">เข้าสู่ระบบ</span>
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">
            <i class="bi bi-shield-lock mr-1"></i>
            ระบบนี้ใช้งานส่วนตัวเท่านั้น
        </p>
    </div>

    <script>
        // If already logged in, redirect to main app
        (function () {
            const token = localStorage.getItem('auth_token');
            if (token) {
                // Verify token is still valid
                fetch('/api/auth/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(res => {
                    if (res.ok) {
                        window.location.href = '/expense/index.html';
                    } else {
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('auth_user');
                    }
                }).catch(() => {
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('auth_user');
                });
            }
        })();

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash text-lg';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye text-lg';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            // Hide previous error
            errorMsg.style.display = 'none';

            // Loading state
            btn.disabled = true;
            btnText.textContent = 'กำลังเข้าสู่ระบบ...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorText.textContent = data.error || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Save token and user info
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('auth_user', JSON.stringify(data.user));

                // Redirect to main app
                window.location.href = '/expense/index.html';

            } catch (err) {
                errorText.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'เข้าสู่ระบบ';
            }
        }
    </script>
</body>

</html>
